<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Fashion Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
  // 🚫 BLOCK BEFORE UI LOADS (NO FLASH)
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    document.body.innerHTML = ""; // prevents dashboard flash
    window.location.replace("login.html");
  }
</script>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <h3>User ID: <span id="userId"></span></h3>
      <h2>Welcome, I’m your AI stylist <span id="userName"></span>!</h2>

      <br>

      <div class="nav">
        <button onclick="startChat('general')">New Chat</button>
        <button onclick="loadRecentChats()">History</button>
      </div>

      <br>

      <div class="recent-chats"></div>
    </div>

    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>Hello, Trendsetter!</h1>
    <p>Choose a category to start a real-time fashion conversation.</p>

    <div class="categories">

      <div class="card pink" onclick="startChat('girls')">
        <h3>Girls Style</h3>
      </div>

      <div class="card purple" onclick="startChat('boys')">
        <h3>Boys Style</h3>
      </div>

      <div class="card blue" onclick="startChat('formal')">
        <h3>Formal & Events</h3>
      </div>

      <div class="card orange" onclick="startChat('accessories')">
        <h3>Accessories</h3>
      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

<script>
  window.onload = () => {
    const user = JSON.parse(localStorage.getItem("user"));

    document.getElementById("userId").textContent =
      user.email || user.name;

    document.getElementById("userName").textContent =
      user.name;

    loadRecentChats();
  };
</script>

</body>
</html>
